<div class="tab-pane fade" id="tab-roadmap" data-save-key="stage1-roadmap">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-map me-2"></i> 전략 및 로드맵 수립
        </div>
        <div class="card-body">
            <form id="roadmapForm">
                <div class="mb-4">
                    <label class="form-label"><strong>AI 비전 선언문</strong></label>
                    <textarea class="form-control" id="rm_vision" rows="3"
                        placeholder="예: AI 기술을 통해 제조 품질을 혁신하고, 데이터 기반 의사결정 문화를 구축하여 업계 최고 수준의 스마트 팩토리를 실현한다."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label"><strong>전략적 목표</strong></label>
                    <div id="strategicGoals">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" placeholder="전략적 목표 1">
                            <button class="btn btn-outline-danger" type="button" onclick="removeGoal(this)"><i
                                    class="bi bi-x"></i></button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="addGoal()">
                        <i class="bi bi-plus"></i> 목표 추가
                    </button>
                </div>

                <div class="mb-4">
                    <label class="form-label"><strong>핵심 성과 지표 (KPI)</strong></label>
                    <div id="kpiList">
                        <div class="row g-2 mb-2 kpi-item">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="KPI 명">
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" placeholder="현재값">
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" placeholder="목표값">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-outline-danger w-100" type="button" onclick="removeKpi(this)"><i
                                        class="bi bi-x"></i></button>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="addKpi()">
                        <i class="bi bi-plus"></i> KPI 추가
                    </button>
                </div>

                <hr>
                <h5>단계별 로드맵</h5>

                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card border-success">
                            <div class="card-header bg-success text-white">
                                <i class="bi bi-lightning me-2"></i>Quick Win (6개월 이내)
                            </div>
                            <div class="card-body">
                                <p class="small text-muted">높은 ROI, 빠른 실현 가능</p>
                                <div id="quickWins">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control form-control-sm" placeholder="과제명">
                                        <button class="btn btn-outline-danger btn-sm" type="button"
                                            onclick="removeItem(this)"><i class="bi bi-x"></i></button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-success btn-sm w-100"
                                    onclick="addRoadmapItem('quickWins')">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-warning">
                            <div class="card-header bg-warning text-dark">
                                <i class="bi bi-compass me-2"></i>Strategic (6-18개월)
                            </div>
                            <div class="card-body">
                                <p class="small text-muted">핵심 역량 구축</p>
                                <div id="strategicItems">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control form-control-sm" placeholder="과제명">
                                        <button class="btn btn-outline-danger btn-sm" type="button"
                                            onclick="removeItem(this)"><i class="bi bi-x"></i></button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-warning btn-sm w-100"
                                    onclick="addRoadmapItem('strategicItems')">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-primary">
                            <div class="card-header bg-primary text-white">
                                <i class="bi bi-rocket me-2"></i>Transformational (18개월+)
                            </div>
                            <div class="card-body">
                                <p class="small text-muted">비즈니스 모델 혁신</p>
                                <div id="transformationalItems">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control form-control-sm" placeholder="과제명">
                                        <button class="btn btn-outline-danger btn-sm" type="button"
                                            onclick="removeItem(this)"><i class="bi bi-x"></i></button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-primary btn-sm w-100"
                                    onclick="addRoadmapItem('transformationalItems')">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="button" class="btn btn-primary btn-lg" onclick="saveRoadmap()">
                        <i class="bi bi-check-lg me-2"></i>로드맵 저장
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-lg ms-2"
                        onclick="analyzeWithAI('roadmap')">
                        <i class="bi bi-robot me-2"></i>AI 분석 요청
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
