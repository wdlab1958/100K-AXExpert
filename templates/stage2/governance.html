<div class="tab-pane fade" id="tab-governance" data-save-key="stage2-governance">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-shield-check me-2"></i> 거버넌스 및 윤리 체계
        </div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">데이터 프라이버시</div>
                        <div class="card-body">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_anonymization">
                                <label class="form-check-label" for="gov_anonymization">개인정보 비식별화
                                    적용</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_consent">
                                <label class="form-check-label" for="gov_consent">데이터 사용 동의 체계</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_retention">
                                <label class="form-check-label" for="gov_retention">데이터 보존 정책 수립</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">편향성 관리</div>
                        <div class="card-body">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_bias_test">
                                <label class="form-check-label" for="gov_bias_test">편향성 테스트 수행</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_fairness">
                                <label class="form-check-label" for="gov_fairness">공정성 지표 모니터링</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_diverse">
                                <label class="form-check-label" for="gov_diverse">다양한 데이터셋 확보</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">설명가능성 (XAI)</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">설명가능성 수준</label>
                                <select class="form-select" id="gov_xai_level">
                                    <option value="basic">기본 (Feature Importance)</option>
                                    <option value="medium">중간 (SHAP/LIME)</option>
                                    <option value="advanced">고급 (Attention, Counterfactual)</option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="gov_decision_log">
                                <label class="form-check-label" for="gov_decision_log">의사결정 로깅</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">감사 추적</div>
                        <div class="card-body">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_model_version">
                                <label class="form-check-label" for="gov_model_version">모델 버전 관리</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_data_lineage">
                                <label class="form-check-label" for="gov_data_lineage">데이터 리니지
                                    추적</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="gov_audit_log">
                                <label class="form-check-label" for="gov_audit_log">감사 로그 보존</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">규제 준수 항목</label>
                    <div class="row g-2">
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reg_gdpr">
                                <label class="form-check-label" for="reg_gdpr">GDPR</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reg_pipa">
                                <label class="form-check-label" for="reg_pipa">개인정보보호법</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reg_iso">
                                <label class="form-check-label" for="reg_iso">ISO 27001</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reg_aiact">
                                <label class="form-check-label" for="reg_aiact">EU AI Act</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="button" class="btn btn-primary btn-lg" onclick="saveGovernance()">
                    <i class="bi bi-check-lg me-2"></i>거버넌스 체계 저장
                </button>
            </div>
        </div>
    </div>
</div>
