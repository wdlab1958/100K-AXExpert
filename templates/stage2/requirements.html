<div class="tab-pane fade show active" id="tab-requirements" data-save-key="stage2-requirements">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-list-check me-2"></i> 상세 요건 정의
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Use Case 선택</label>
                    <select class="form-select" id="req_usecase" onchange="onUseCaseSelected(this.value)">
                        <option value="">-- Use Case 선택 --</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">비즈니스 목표</label>
                    <input type="text" class="form-control" id="req_objective" placeholder="예: 불량률 50% 감소">
                </div>
                <div class="col-12">
                    <label class="form-label">성공 기준 (KPI)</label>
                    <div id="successCriteria">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" placeholder="예: 정확도 95% 이상">
                            <button class="btn btn-outline-danger" type="button" onclick="removeItem(this)"><i
                                    class="bi bi-x"></i></button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addCriteria()">
                        <i class="bi bi-plus"></i> 기준 추가
                    </button>
                </div>
                <div class="col-md-6">
                    <label class="form-label">입력 데이터</label>
                    <textarea class="form-control" id="req_input" rows="3"
                        placeholder="예: 제품 이미지 (1920x1080 RGB), 센서 데이터 (온도, 압력)"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">출력 형태</label>
                    <textarea class="form-control" id="req_output" rows="3"
                        placeholder="예: 양품/불량 분류 결과, 불량 유형, 신뢰도 점수"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">목표 정확도 (%)</label>
                    <input type="number" class="form-control" id="req_accuracy" value="95" min="0" max="100">
                </div>
                <div class="col-md-4">
                    <label class="form-label">목표 응답시간 (ms)</label>
                    <input type="number" class="form-control" id="req_latency" value="100" min="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label">목표 처리량 (건/초)</label>
                    <input type="number" class="form-control" id="req_throughput" value="10" min="0">
                </div>
                <div class="col-12">
                    <label class="form-label">통합 대상 시스템</label>
                    <input type="text" class="form-control" id="req_integration" placeholder="예: MES, ERP, 품질관리시스템">
                </div>
                <div class="col-12">
                    <label class="form-label">보안 및 컴플라이언스 요구사항</label>
                    <textarea class="form-control" id="req_security" rows="2"
                        placeholder="예: 개인정보 비식별화, ISO 27001 준수"></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="button" class="btn btn-primary btn-lg" onclick="saveRequirements()">
                    <i class="bi bi-check-lg me-2"></i>요건 정의 저장
                </button>
            </div>
        </div>
    </div>
</div>
